[tweaks.fixes]
# Keeps rendering world as is when changing interior via ENEX marker.
dont-cull-world-on-enex = true

# Reduces radius of the CCarGenerator::CheckForBlockage by 20 times, allowing Hunter to spawn next to the Leviathan.
fix-car-generator-blockage = true

# Allows police bikes to utilize CCarAI::MakeWayForCarWithSiren too.
fix-police-bike-siren = true

# Fixes uncrouching due to PS2 button collisions when using first person weapons such as a sniper rifle.
fix-zoom-uncrouching = true

# Makes the number of garage slots in Ganton consistent with other garages.
ganton-garage-four-slots = true

# When CJ dies from fire, his body will char like other pedestrians'.
scorched-cj = true

[tweaks.gameplay]
# Allows climbing in interiors.
climb-everywhere = true

# Allows sprinting on any surface during any mission,
# during the animation of putting on/taking off goggles,
# and while standing on entities (trains).
sprint-everywhere = true
